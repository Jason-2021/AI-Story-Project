# configs/base_config.yaml
video_settings:
  target_duration_seconds: 60
  target_word_count: "135 to 145" # 黃金 60 秒語速
  min_scenes: 4
  max_scenes: 5
  script_structure: "Context, Escalation, Climax / Clear Takeaway" # 強制分鏡推進故事

global_forbidden_phrases:
  - "like and subscribe"
  - "smash that bell"
  - "what's up guys"
  - "without further ado"
  - "welcome back to my channel"
  - "in today's video"

llm_settings:
  model_name: "gemini-2.5-flash"
  temperature: 0.7

tts_settings:
  model_name: "gemini-2.5-flash-preview-tts"
  # 可用聲音：achernar, achird, algenib, algieba, alnilam, aoede, autonoe,
  #           callirrhoe, charon, despina, enceladus, erinome, fenrir, gacrux,
  #           iapetus, kore, laomedeia, leda, orus, puck, pulcherrima, rasalgethi,
  #           sadachbia, sadaltager, schedar, sulafat, umbriel, vindemiatrix,
  #           zephyr, zubenelgenubi
  voice_name: "charon"
  sample_rate: 24000

image_settings:
  model_name: "gemini-2.5-flash-image"
  aspect_ratio: "16:9"

video_renderer:
  canvas_width: 1080
  canvas_height: 1920
  fps: 24
  ken_burns_strategy: "alternate_lr"   # 可換: all_left_to_right, all_right_to_left
  zoom_strategy: "alternate"           # 可換: zoom_in, zoom_out
  zoom_amount: 0.12                    # 可換: 0.10 ~ 0.20，越大鏡頭移動越明顯
  transition: "hard_cut"              # 可換: fade_black, crossfade
  caption_words_per_group: 3
  caption_position_y_ratio: 0.65
  caption_font_size: 100
  caption_highlight_color: "#FFD700"
  caption_uppercase: true             # 可換: false

image_generation_rules:
  strict_no_text: true
  aspect_ratio: "16:9"