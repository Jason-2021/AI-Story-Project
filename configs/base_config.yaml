# configs/base_config.yaml
video_settings:
  target_duration_seconds: 60
  target_word_count: "135 to 145" # 黃金 60 秒語速
  min_scenes: 4
  max_scenes: 5
  script_structure: "Context, Escalation, Climax / Clear Takeaway" # 強制分鏡推進故事

global_forbidden_phrases:
  - "like and subscribe"
  - "smash that bell"
  - "what's up guys"
  - "without further ado"
  - "welcome back to my channel"
  - "in today's video"

llm_settings:
  model_name: "gemini-2.5-flash"
  temperature: 0.7

openai_llm_settings:
  model_name: "gpt-5.4-mini"
  temperature: 0.7

tts_settings:
  model_name: "gemini-2.5-flash-preview-tts"
  # 可用聲音：achernar, achird, algenib, algieba, alnilam, aoede, autonoe,
  #           callirrhoe, charon, despina, enceladus, erinome, fenrir, gacrux,
  #           iapetus, kore, laomedeia, leda, orus, puck, pulcherrima, rasalgethi,
  #           sadachbia, sadaltager, schedar, sulafat, umbriel, vindemiatrix,
  #           zephyr, zubenelgenubi
  voice_name: "charon"
  sample_rate: 24000

image_settings:
  provider: "openai"             # gemini | openai
  # 控制每個場景的圖片生成比例：
  #   all_16_9      — 全部 16:9（橫式，Ken Burns 水平移動）
  #   all_9_16      — 全部 9:16（直式，Zoom in/out）
  #   all_1_1       — 全部 1:1（正方，Ken Burns 輕微水平移動）
  #   alternate     — 交替 16:9 / 9:16（奇數場景橫式，偶數直式）
  #   wide_first    — 第 1 場 16:9，其餘 9:16
  #   portrait_heavy — 9:16, 9:16, 16:9, 9:16, 9:16... 循環
  scene_ratio_mode: "alternate"

gemini_image_settings:
  model_name: "gemini-2.5-flash-image"

openai_image_settings:
  model_name: "gpt-image-2"
  quality: "low"                 # low | medium | high | auto

video_renderer:
  canvas_width: 1080
  canvas_height: 1920
  fps: 24
  ken_burns_strategy: "alternate_lr"    # 可換: all_left_to_right, all_right_to_left
  ken_burns_v_strategy: "alternate_tb"  # 垂直 Ken Burns（長影音用）可換: all_top_to_bottom, all_bottom_to_top
  zoom_strategy: "alternate"            # 可換: zoom_in, zoom_out
  zoom_amount: 0.12                     # 可換: 0.10 ~ 0.20，越大鏡頭移動越明顯
  transition: "hard_cut"               # 可換: fade_black, crossfade
  caption_words_per_group: 3
  caption_position_y_ratio: 0.65
  caption_font_size: 100
  caption_highlight_color: "#FFD700"
  caption_uppercase: true              # 可換: false
  caption_max_width_ratio: 0.90        # 字幕最大寬度為畫布的比例（超過自動換行）

long_form_renderer:
  canvas_width: 1920
  canvas_height: 1080
  fps: 24
  ken_burns_strategy: "alternate_lr"
  ken_burns_v_strategy: "alternate_tb"
  zoom_strategy: "alternate"
  zoom_amount: 0.12
  transition: "fade_black"
  # 字幕設定繼承自 video_renderer（未在此覆蓋即用 video_renderer 的值）

bgm_settings:
  enabled: true                  # true 才執行混音，false 跳過
  path: "assets/bgm/Ziv Moran - Shades - Dark.mp3" # 相對於專案根目錄
  volume: 0.12                      # BGM 音量（TTS = 1.0）
  eq_freq: 2000                     # 挖掉頻率的中心點（Hz）
  eq_gain_db: -4                    # 挖掉深度（dB，負數）
  eq_width_octaves: 2               # EQ 寬度（octaves）