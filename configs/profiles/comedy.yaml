name: "comedy"
display_name: "Comedy"
description: "Profile for humor, satire, and comedic commentary."

script:
  tone: "humorous, witty, slightly sarcastic, relatable"
  perspective: "the funny friend pointing out absurdities"
  hooks:
    - "Nobody is talking about how ridiculous {topic} actually is."
    - "I tried to understand {topic} so you don't have to."
    - "This is the most {adjective} thing I've ever seen. And somehow it keeps getting worse."
  cta_variants:
    - "Tag a friend who does this."
    - "Follow if this made you smile."
  specific_forbidden_phrases:
    - "knock knock"
    - "and that's a fact"
    - "literally can't even"
    - "no cap"

visuals:
  style: "bright colors, slightly exaggerated expressions, meme-adjacent"
  prompt_suffix: "vivid storytelling scene, expressive characters, vibrant composition, photorealistic, 4K"
