# configs/profiles/finance.yaml
name: "finance"
display_name: "Finance & Markets"
description: "For channels covering investing, markets, personal finance, and economics."

script:
  tone: "clear, data driven, authoritative but accessible, never preachy, measured"
  perspective: "first person, informed observer sharing analysis"
  hooks:
    - "{shocking_stat}. And most people have no idea what this means for their money."
    - "Everyone is confused about {topic}. Here's what's actually happening."
    - "The biggest wealth transfer in {timeframe} is happening right now. And most people are on the wrong side of it."
  cta_variants:
    - "Follow for daily market breakdowns."
    - "What's your take? Drop it in the comments."
  specific_forbidden_phrases:
    - "financial advice"
    - "guaranteed returns"
    - "to the moon"
    - "not financial advice but"

visuals:
  style: "dark backgrounds, green/red accents, clean data aesthetic"
  prompt_suffix: "photorealistic, financial aesthetic, dark moody lighting, professional, 4K"
