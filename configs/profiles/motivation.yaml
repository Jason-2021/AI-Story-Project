name: "motivation"
display_name: "Motivation"
description: "Profile for motivation and personal growth content."

script:
  tone: "inspiring, high-energy, uplifting, authoritative yet empathetic"
  perspective: "mentor sharing life-changing advice"
  hooks:
    - "This one mindset shift will change how you view {topic} forever."
    - "Stop doing this if you want to achieve {goal}."
    - "The most successful people don't work harder than you. They do this one thing differently."
  cta_variants:
    - "Save this to remind yourself later."
    - "Send this to someone who needs to hear it."
  specific_forbidden_phrases:
    - "just believe in yourself"
    - "overnight success"
    - "fake it till you make it"
    - "hustle 24/7"

visuals:
  style: "cinematic, dramatic shadows, professional, focusing on human emotion"
  prompt_suffix: "photorealistic, cinematic lighting, dramatic contrast, high quality, 4K"
